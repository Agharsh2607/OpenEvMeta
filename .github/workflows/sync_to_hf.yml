name: Sync to Hugging Face
on:
  push:
    branches:
      - main

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://agcreay:$HF_TOKEN@huggingface.co/spaces/Agcreay/OpenEvMeta
          git push --force space main
